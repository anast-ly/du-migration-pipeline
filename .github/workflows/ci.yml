name: CI/CD

on:
  pull_request:
  push:
    branches: [main]

env:
  REGION: europe-west2
  JOB: du-migration-job
  IMAGE: europe-west2-docker.pkg.dev/assessment-500800/du-migration/du-migration-job

jobs:
  # Lint + tests run on every PR and push. No cloud credentials needed:
  # the unit tests run against fixtures, fully offline.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: pip install -e ".[dev]"
      - name: Lint
        run: ruff check src tests
      - name: Test
        run: pytest tests/ -v

  # Build + push image + deploy the new version. Only on push to main.
  build-deploy:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for Workload Identity Federation
    steps:
      - uses: actions/checkout@v4

      # Keyless auth: exchanges the GitHub OIDC token for short-lived GCP creds.
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.DEPLOYER_SA }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${REGION}-docker.pkg.dev --quiet

      # Tag with the commit SHA (traceable) and latest.
      - name: Build and push
        run: |
          docker build -t ${IMAGE}:${{ github.sha }} -t ${IMAGE}:latest .
          docker push ${IMAGE}:${{ github.sha }}
          docker push ${IMAGE}:latest

      # Point the existing Cloud Run Job (created by Terraform) at the new image.
      - name: Deploy new image to Cloud Run Job
        run: |
          gcloud run jobs update ${JOB} \
            --image ${IMAGE}:${{ github.sha }} \
            --region ${REGION}
