# Local end-to-end: spins up a Postgres target and runs the migration job
# against it. No cloud credentials required — TARGET_BACKEND is forced to
# postgres here, so a teammate can run the whole thing offline.
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-du_migration}
      POSTGRES_USER: ${POSTGRES_USER:-migration}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    ports:
      # Exposed on the host so you can inspect the loaded data (psql / DBeaver).
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-migration} -d ${POSTGRES_DB:-du_migration}"]
      interval: 5s
      timeout: 3s
      retries: 5

  migration:
    build: .
    # Loads API URL, page size, etc. from the host .env file.
    env_file: .env
    environment:
      # Local run targets Postgres, reached via the compose service name
      # (NOT localhost — that's the classic compose networking gotcha).
      TARGET_BACKEND: postgres
      POSTGRES_HOST: postgres
    depends_on:
      postgres:
        # Wait until Postgres actually accepts connections, not just "started".
        condition: service_healthy

volumes:
  pgdata:
