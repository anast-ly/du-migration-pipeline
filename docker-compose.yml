# Local end-to-end: spins up a Postgres target and runs the migration job
# against it. Fully plug-and-play — no .env required. Every value has a default
# via ${VAR:-default}; create a .env only if you want to override something.
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-du_migration}
      POSTGRES_USER: ${POSTGRES_USER:-migration}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    ports:
      # Exposed on the host so you can inspect the loaded data (psql / DBeaver).
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-migration} -d ${POSTGRES_DB:-du_migration}"]
      interval: 5s
      timeout: 3s
      retries: 5

  migration:
    build: .
    environment:
      # Local run targets Postgres, reached via the compose service name
      # Reached by the compose service name, not localhost.
      TARGET_BACKEND: postgres
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-du_migration}
      POSTGRES_USER: ${POSTGRES_USER:-migration}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      TARGET_STATES: ${TARGET_STATES:-CA,OR,WA}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DRY_RUN: "false"
    depends_on:
      postgres:
        # Wait until Postgres actually accepts connections, not just "started".
        condition: service_healthy

volumes:
  pgdata:
